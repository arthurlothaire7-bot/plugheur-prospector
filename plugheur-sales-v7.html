<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plug'Heur — Sales Intelligence</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,800,900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F4F2ED;
  --black: #0F0E0C;
  --white: #FFFFFF;
  --yellow: #FFE135;
  --yellow-dark: #D4B800;
  --red: #E8291E;
  --orange: #E86820;
  --amber: #D4900A;
  --blue: #1847E8;
  --green: #0B9E58;
  --surf: #FFFFFF;
  --surf2: #ECEAE3;
  --border: rgba(15,14,12,0.12);
  --border-dark: #0F0E0C;
  --muted: #7A7670;
  --text: #0F0E0C;
  --font: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;

  /* Signal category colors */
  --sig-red: #E8291E;
  --sig-red-bg: rgba(232,41,30,0.06);
  --sig-red-border: rgba(232,41,30,0.2);
  --sig-orange: #E86820;
  --sig-orange-bg: rgba(232,104,32,0.06);
  --sig-orange-border: rgba(232,104,32,0.2);
  --sig-amber: #C47D00;
  --sig-amber-bg: rgba(196,125,0,0.06);
  --sig-amber-border: rgba(196,125,0,0.2);
  --sig-blue: #1847E8;
  --sig-blue-bg: rgba(24,71,232,0.05);
  --sig-blue-border: rgba(24,71,232,0.15);
}

html, body { height: 100%; font-size: 15px; }
body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; line-height: 1.5; }

/* ━━━ TOPBAR ━━━ */
.topbar {
  background: var(--black);
  height: 54px; padding: 0 32px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 2.5px solid var(--yellow);
}
.logo-wrap { display: flex; align-items: center; gap: 10px; }
.logo-bolt { background: var(--yellow); color: var(--black); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 15px; border-radius: 6px; flex-shrink: 0; }
.logo-name { color: #fff; font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
.logo-name span { color: var(--yellow); }
.topbar-div { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }
.topbar-label { color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 500; letter-spacing: 0.5px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.topbar-badge { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 4px 12px; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.3px; }

/* ━━━ SEARCH ━━━ */
.search-page { min-height: calc(100vh - 54px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px 80px; }
.search-inner { width: 100%; max-width: 660px; }

.hero-label { display: inline-flex; align-items: center; gap: 8px; background: var(--yellow); color: var(--black); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; margin-bottom: 22px; }
.hero-dot { width: 5px; height: 5px; background: var(--black); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.hero-h1 { font-size: clamp(32px,5.5vw,52px); font-weight: 800; line-height: 1.08; letter-spacing: -1.5px; color: var(--black); margin-bottom: 14px; }
.hero-h1 span { position: relative; display: inline-block; }
.hero-h1 span::after { content: ''; position: absolute; left: 0; bottom: 2px; right: 0; height: 6px; background: var(--yellow); z-index: -1; }
.hero-sub { font-size: 16px; color: var(--muted); font-weight: 400; margin-bottom: 44px; line-height: 1.6; max-width: 520px; }

/* Search Card */
.scard { background: var(--surf); border: 1.5px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: 0 4px 40px rgba(0,0,0,0.06); }
.scard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.sfield { display: flex; flex-direction: column; gap: 6px; }
.sfield-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); }
.sfield-input { border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-family: var(--font); font-size: 14px; font-weight: 500; background: var(--bg); outline: none; transition: border-color .15s, background .15s; color: var(--black); }
.sfield-input:focus { border-color: var(--black); background: var(--white); }
.sfield-input::placeholder { color: #bbb; font-weight: 400; }
select.sfield-input { cursor: pointer; }

/* Keywords accordion */
.kw-block { border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
.kw-trigger { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; background: var(--bg); transition: background .15s; }
.kw-trigger:hover { background: var(--surf2); }
.kw-trigger-left { display: flex; align-items: center; gap: 10px; }
.kw-trigger-label { font-size: 13px; font-weight: 600; color: var(--black); }
.kw-cats { display: flex; gap: 5px; }
.kcat { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 100px; border: 1px solid; }
.kcat.red { color: var(--sig-red); border-color: var(--sig-red-border); background: var(--sig-red-bg); }
.kcat.orange { color: var(--sig-orange); border-color: var(--sig-orange-border); background: var(--sig-orange-bg); }
.kcat.amber { color: var(--sig-amber); border-color: var(--sig-amber-border); background: var(--sig-amber-bg); }
.kcat.blue { color: var(--sig-blue); border-color: var(--sig-blue-border); background: var(--sig-blue-bg); }
.kw-count { font-size: 11px; font-weight: 700; background: var(--black); color: var(--yellow); padding: 2px 9px; border-radius: 100px; }
.kw-arrow { color: var(--muted); font-size: 12px; transition: transform .2s; }
.kw-arrow.open { transform: rotate(180deg); }

.kw-panel { display: none; padding: 16px; border-top: 1.5px solid var(--border); background: var(--white); }
.kw-panel.open { display: block; }
.kw-category { margin-bottom: 14px; }
.kw-category:last-child { margin-bottom: 0; }
.kw-cat-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.kw-cat-head.red { color: var(--sig-red); }
.kw-cat-head.orange { color: var(--sig-orange); }
.kw-cat-head.amber { color: var(--sig-amber); }
.kw-cat-head.blue { color: var(--sig-blue); }
.kw-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.kw-pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 100px; border: 1px solid; }
.kw-pill.red { color: var(--sig-red); border-color: var(--sig-red-border); background: var(--sig-red-bg); }
.kw-pill.orange { color: var(--sig-orange); border-color: var(--sig-orange-border); background: var(--sig-orange-bg); }
.kw-pill.amber { color: var(--sig-amber); border-color: var(--sig-amber-border); background: var(--sig-amber-bg); }
.kw-pill.blue { color: var(--sig-blue); border-color: var(--sig-blue-border); background: var(--sig-blue-bg); }

.go-row { display: flex; gap: 10px; }
.go-btn { flex: 1; background: var(--black); color: var(--yellow); border: none; border-radius: 12px; padding: 15px 24px; font-family: var(--font); font-size: 14px; font-weight: 700; letter-spacing: 0.3px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.go-btn:hover:not(:disabled) { background: #1a1a1a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
.go-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.limit-sel { border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 14px; font-family: var(--font); font-size: 13px; font-weight: 500; background: var(--bg); outline: none; cursor: pointer; color: var(--black); min-width: 140px; }
.err-msg { font-size: 13px; color: var(--red); font-weight: 600; margin-top: 10px; }

/* ━━━ LOADING ━━━ */
.load-page { min-height: calc(100vh - 54px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 60px 24px; }
.load-ring { width: 48px; height: 48px; border: 3px solid var(--surf2); border-top-color: var(--black); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-title { font-size: 14px; font-weight: 700; color: var(--black); letter-spacing: -0.2px; }
.load-bar-wrap { width: 320px; max-width: 100%; height: 3px; background: var(--surf2); border-radius: 100px; overflow: hidden; }
.load-bar { height: 100%; background: var(--black); border-radius: 100px; width: 0%; transition: width .5s ease; }
.load-log { display: flex; flex-direction: column; gap: 5px; width: 320px; max-width: 100%; }
.ll { font-size: 12px; color: var(--muted); display: flex; gap: 8px; font-weight: 500; }
.ll.ok { color: var(--green); }
.ll.act { color: var(--black); font-weight: 700; }
.ll.err { color: var(--red); }

/* ━━━ RESULTS ━━━ */
.results-page { max-width: 1200px; margin: 0 auto; padding: 36px 24px 100px; }

.res-topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; flex-wrap: wrap; }
.back-btn { display: flex; align-items: center; gap: 6px; background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 16px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--black); transition: all .2s; }
.back-btn:hover { border-color: var(--black); }
.res-title { font-size: 14px; font-weight: 500; color: var(--muted); }
.res-title strong { color: var(--black); font-weight: 700; }
.export-btn { margin-left: auto; background: var(--yellow); color: var(--black); border: none; border-radius: 10px; padding: 9px 18px; font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 7px; }
.export-btn:hover { background: #f5d800; transform: translateY(-1px); }

/* Stats strip */
.stats-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 32px; }
.stat-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 20px 22px; }
.stat-val { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -1px; color: var(--black); margin-bottom: 4px; }
.stat-val.y { color: var(--yellow-dark); }
.stat-val.r { color: var(--red); }
.stat-label { font-size: 12px; font-weight: 500; color: var(--muted); }

/* Section heading */
.sec-head { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.sec-head::after { content: ''; flex: 1; height: 1.5px; background: var(--border); }

/* Signal ranking */
.signals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px,1fr)); gap: 10px; margin-bottom: 36px; }
.sig-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 18px; position: relative; overflow: hidden; cursor: default; transition: transform .15s, box-shadow .15s; }
.sig-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.07); }
.sig-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
.sig-card.red .sig-card-accent { background: var(--sig-red); }
.sig-card.orange .sig-card-accent { background: var(--sig-orange); }
.sig-card.amber .sig-card-accent { background: var(--sig-amber); }
.sig-card.blue .sig-card-accent { background: var(--sig-blue); }
.sig-cat-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
.sig-card.red .sig-cat-dot { background: var(--sig-red); }
.sig-card.orange .sig-cat-dot { background: var(--sig-orange); }
.sig-card.amber .sig-cat-dot { background: var(--sig-amber); }
.sig-card.blue .sig-cat-dot { background: var(--sig-blue); }
.sig-cat-label { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.sig-card.red .sig-cat-label { color: var(--sig-red); }
.sig-card.orange .sig-cat-label { color: var(--sig-orange); }
.sig-card.amber .sig-cat-label { color: var(--sig-amber); }
.sig-card.blue .sig-cat-label { color: var(--sig-blue); }
.sig-kw { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }
.sig-count { font-size: 36px; font-weight: 800; line-height: 1; letter-spacing: -1.5px; margin-bottom: 6px; }
.sig-card.red .sig-count { color: var(--sig-red); }
.sig-card.orange .sig-count { color: var(--sig-orange); }
.sig-card.amber .sig-count { color: var(--sig-amber); }
.sig-card.blue .sig-count { color: var(--sig-blue); }
.sig-bar { height: 2.5px; background: var(--surf2); border-radius: 100px; }
.sig-bar-fill { height: 100%; border-radius: 100px; }
.sig-card.red .sig-bar-fill { background: var(--sig-red); }
.sig-card.orange .sig-bar-fill { background: var(--sig-orange); }
.sig-card.amber .sig-bar-fill { background: var(--sig-amber); }
.sig-card.blue .sig-bar-fill { background: var(--sig-blue); }
.sig-venues { font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 6px; }

/* Controls */
.ctrl-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.sort-pill { background: var(--white); border: 1.5px solid var(--border); border-radius: 100px; padding: 6px 14px; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all .15s; }
.sort-pill.on { background: var(--black); border-color: var(--black); color: var(--yellow); }
.sort-pill:hover:not(.on) { border-color: #aaa; color: var(--black); }
.filter-input { background: var(--white); border: 1.5px solid var(--border); border-radius: 100px; padding: 7px 16px; font-family: var(--font); font-size: 13px; font-weight: 500; outline: none; color: var(--black); min-width: 200px; flex: 1; max-width: 300px; transition: border-color .15s; }
.filter-input:focus { border-color: var(--black); }
.filter-input::placeholder { color: #bbb; }
.res-count { font-size: 12px; font-weight: 500; color: var(--muted); margin-left: auto; }

/* Table */
.tbl-wrap { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
.tbl-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--black); }
th { color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 13px 14px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; border-right: 1px solid rgba(255,255,255,0.06); transition: color .15s; }
th:hover { color: var(--yellow); }
th.on { color: var(--yellow); }
th:last-child { border-right: none; }
td { padding: 13px 14px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: middle; }
td:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAF7; }
tr.sel td { background: #FFFCE5 !important; }

.rank { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--black); color: var(--yellow); font-size: 11px; font-weight: 800; border-radius: 8px; }
.vname { font-weight: 700; font-size: 13px; color: var(--black); }
.vaddr { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 1px; }
.vcat { font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
.rval { font-size: 13px; font-weight: 700; white-space: nowrap; }
.rval.bad { color: var(--red); }
.rval.ok  { color: var(--amber); }
.rval.good{ color: var(--green); }
.hval { font-size: 13px; font-weight: 700; }
.hval.z { color: #ccc; font-weight: 400; font-size: 11px; }
.hval.hot { color: var(--red); }

/* Signal columns colored */
.hval-red { color: var(--sig-red); font-weight: 800; font-size: 14px; }
.hval-orange { color: var(--sig-orange); font-weight: 800; font-size: 14px; }
.hval-amber { color: var(--sig-amber); font-weight: 800; font-size: 14px; }
.hval-blue { color: var(--sig-blue); font-weight: 800; font-size: 14px; }

.sval { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.sval.hot  { color: var(--red); }
.sval.warm { color: var(--amber); }
.sval.cold { color: #bbb; }
.opp { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 100px; border: 1.5px solid; white-space: nowrap; }
.opp.hot  { background: rgba(232,41,30,.07); border-color: rgba(232,41,30,.25); color: var(--red); }
.opp.warm { background: rgba(212,144,10,.07); border-color: rgba(212,144,10,.25); color: var(--amber); }
.opp.cold { background: var(--surf2); border-color: var(--border); color: var(--muted); }
.action-btn { background: var(--yellow); color: var(--black); border: none; border-radius: 8px; padding: 7px 14px; font-family: var(--font); font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .15s; letter-spacing: 0.3px; }
.action-btn:hover { background: #f5d800; transform: translateY(-1px); }

/* ━━━ SIDE PANEL ━━━ */
.overlay { position: fixed; inset: 0; background: rgba(15,14,12,0.4); backdrop-filter: blur(4px); z-index: 300; display: flex; align-items: stretch; justify-content: flex-end; }
.side-panel { width: 100%; max-width: 600px; background: var(--white); display: flex; flex-direction: column; overflow: hidden; box-shadow: -24px 0 80px rgba(0,0,0,0.12); animation: slideIn .25s cubic-bezier(.4,0,.2,1); }
@keyframes slideIn { from{transform:translateX(32px);opacity:0} to{transform:none;opacity:1} }

.panel-top { background: var(--black); padding: 22px 24px; flex-shrink: 0; }
.panel-top-row { display: flex; align-items: flex-start; gap: 14px; }
.panel-close { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; margin-left: auto; margin-top: 2px; }
.panel-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
.panel-name { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 10px; line-height: 1.25; letter-spacing: -0.3px; }
.panel-tags { display: flex; flex-wrap: wrap; gap: 7px; }
.ptag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; border: 1px solid; }
.ptag.neutral { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }
.ptag.red { border-color: rgba(232,41,30,0.5); color: #ff7a72; background: rgba(232,41,30,0.12); }
.ptag.green { border-color: rgba(11,158,88,0.5); color: #4de89a; background: rgba(11,158,88,0.12); }
.ptag.amber { border-color: rgba(212,144,10,0.5); color: #ffc84d; background: rgba(212,144,10,0.12); }
.ptag.yellow { border-color: rgba(255,225,53,0.4); color: var(--yellow); background: rgba(255,225,53,0.1); }

.panel-body { flex: 1; overflow-y: auto; }
.panel-section { padding: 22px 24px; border-bottom: 1px solid var(--border); }
.panel-section:last-child { border-bottom: none; }
.psec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.psec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Evidence */
.ev-list { display: flex; flex-direction: column; gap: 8px; }
.ev-item { border-radius: 10px; padding: 12px 14px; border-left: 3px solid; }
.ev-item.neg { background: rgba(232,41,30,.04); border-left-color: var(--red); }
.ev-item.pos { background: rgba(11,158,88,.04); border-left-color: var(--green); }
.ev-item.neu { background: var(--bg); border-left-color: var(--border); }
.ev-rating { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
.ev-stars { letter-spacing: -2px; }
.ev-text { font-size: 13px; line-height: 1.65; color: var(--text); }
.ev-text mark { background: rgba(255,225,53,0.55); padding: 0 2px; border-radius: 3px; font-style: normal; color: var(--black); }
.ev-empty { font-size: 13px; color: var(--muted); font-style: italic; padding: 8px 0; line-height: 1.6; }

/* Script */
.script-loading { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--bg); border-radius: 12px; }
.mini-spin { width: 18px; height: 18px; border: 2.5px solid var(--surf2); border-top-color: var(--black); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
.script-loading-text { font-size: 13px; font-weight: 500; color: var(--muted); }

// ━━━ GRAND COMPTE LAUNCH ━━━
async function goGrand() {
  const raw = document.getElementById('gcUrl')?.value.trim() || '';
  const lim = parseInt(document.getElementById('gcLimSel')?.value || 10);
  if (!raw) { renderGrandInput('Saisis une URL de site web.'); return; }

  const brand = extractBrand(raw);
  if (!brand) { renderGrandInput('URL invalide. Essaie leroy-merlin.fr ou fnac.com'); return; }

  S.gcUrl = raw;
  await runGrandCompte(brand, raw, lim);
}

function extractBrand(url) {
  let s = url.toLowerCase()
    .replace(/^https?:\/\//, '').replace(/^www\./, '')
    .split('/')[0].split('?')[0];
  s = s.replace(/\.(fr|com|net|org|co\.uk|eu|be|ch|es|it|pt|de)$/, '');
  return s.replace(/-/g, ' ').split(' ')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ').trim();
}

async function runGrandCompte(brand, url, limit) {
  // ── Loading UI ──
  document.getElementById('main').innerHTML = `
  <div style="min-height:calc(100vh - 54px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:60px 24px;">

    <div style="width:340px;max-width:100%;height:3px;background:var(--surf2);border-radius:100px;overflow:hidden;">

    </div>
    <div id="gcSteps" style="display:flex;flex-direction:column;gap:8px;width:340px;max-width:100%;"></div>
  </div>`;

  const steps = [
    { id:'s1', icon:'🌐', label:'Recherche web — actualités & stratégie...' },
    { id:'s2', icon:'⭐', label:'Google Places — avis clients...' },
    { id:'s3', icon:'📱', label:'Détection usage smartphone...' },
    { id:'s4', icon:'👤', label:'Identification des contacts clés...' },
    { id:'s5', icon:'✦',  label:'Synthèse IA — angle conseiller...' }
  ];

  function setGcStep(activeIdx, pct) {
    document.getElementById('gcBar').style.width = pct + '%';
    document.getElementById('gcSteps').innerHTML = steps.map((s, i) => {
      const state = i < activeIdx ? 'done' : i === activeIdx ? 'active' : '';
      const bg = state==='done'?'rgba(11,158,88,.1)':state==='active'?'var(--black)':'var(--surf2)';
      const color = state==='done'?'var(--green)':state==='active'?'var(--yellow)':'var(--muted)';
      const textColor = state==='active'?'var(--black)':state==='done'?'var(--green)':'var(--muted)';
      const fw = state==='active'?'700':'500';
      return `<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:${textColor};font-weight:${fw};transition:all .3s;">
        <div style="width:28px;height:28px;border-radius:50%;background:${bg};color:${color};display:flex;align-items:center;justify-content:center;font-size:${state==='active'?'12':'14'}px;flex-shrink:0;${state==='active'?'animation:pulse 1s ease infinite;':''}">
          ${state==='done'?'✓':s.icon}
        </div>
        ${s.label}
      </div>`;
    }).join('');
  }

  try {
    // ── STEP 1: Web search via Claude API with web_search tool ──
    setGcStep(0, 10);
    await sleep(200);

    const webSearchPrompt = `Fais une recherche web sur "${brand}" et donne-moi :
1. Les 3-5 actualités récentes les plus importantes (expansion, nouveaux services, stratégie client, digital, mobile)
2. Leur positionnement actuel sur l'expérience client
3. Des initiatives digitales ou mobiles récentes mentionnées

Réponds en JSON :
{
  "actus": [{"titre":"...", "date":"...", "source":"...", "resume":"..."}],
  "positionnement_xp": "...",
  "initiatives_mobile": ["..."],
  "problemes_identifies": ["..."],
  "angle_strategique": "..."
}`;

    let webData = null;
    try {
      const webRes = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: webSearchPrompt }]
        })
      });
      const webJson = await webRes.json();
      // Extract text from response (could be after tool_use blocks)
      const textBlock = (webJson.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
      if (textBlock) {
        try {
          const cleaned = textBlock.replace(/```json[\s\S]*?```|```/g, '').trim();
          // Find JSON object in response
          const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
          if (jsonMatch) webData = JSON.parse(jsonMatch[0]);
        } catch(e) {
          // Keep raw text if JSON parse fails
          webData = { raw: textBlock, actus: [], positionnement_xp: textBlock.slice(0, 300), initiatives_mobile: [], problemes_identifies: [], angle_strategique: '' };
        }
      }
    } catch(e) {
      webData = { actus: [], positionnement_xp: 'Non disponible', initiatives_mobile: [], problemes_identifies: [], angle_strategique: '' };
    }

    // ── STEP 2: Google Places ──
    setGcStep(1, 35);
    const places = await textSearch(brand, limit);
    const detailed = [];
    for (let i = 0; i < places.length; i++) {
      try { const det = await placeDetails(places[i].name); detailed.push(buildPlace(places[i], det)); }
      catch { detailed.push(buildPlace(places[i], null)); }
      await sleep(80);
    }
    const analyzed = detailed.map(p => scorePlace(p));

    // ── STEP 3: Mobile signal extraction ──
    setGcStep(2, 65);
    await sleep(300);

    // Aggregate all reviews and detect smartphone mentions
    const allReviews = analyzed.flatMap(p => p.reviews.map(r => ({ ...r, store: p.name, city: p.address.split(',').pop()?.trim() || '' })));
    const mobileKeywords = ['téléphone','smartphone','batterie','recharge','charg','prise','portable','mobile','appli','application','connectiv','réseau','wifi','qr','scan','camera','photo','snapchat','instagram'];
    const mobileReviews = allReviews.filter(r => {
      const t = r.text.toLowerCase();
      return mobileKeywords.some(kw => t.includes(kw));
    });
    const mobileSignalCount = mobileReviews.length;
    const negativeMobileReviews = mobileReviews.filter(r => r.rating && r.rating <= 3);

    // ── STEP 4: Contacts clés via web search ──
    setGcStep(3, 68);
    await sleep(200);

    let contacts = [];
    try {
      const contactsPrompt = `Fais une recherche web pour trouver les 5 à 10 personnes clés à contacter chez "${brand}" pour un partenariat sur l'expérience client en magasin et l'usage mobile des visiteurs.

Cherche des profils LinkedIn ou mentions presse pour ces fonctions prioritaires :
- Directeur / Responsable Expérience Client
- Directeur Digital / Transformation Digitale
- Directeur Marketing
- Directeur des Opérations / Retail
- DG / CEO si structure régionale
- Responsable Innovation
- Chief Customer Officer

Réponds UNIQUEMENT en JSON valide :
{
  "contacts": [
    {
      "nom": "Prénom Nom",
      "titre": "Directeur Expérience Client",
      "pertinence": "Raison courte pourquoi ce contact est clé pour Plug'Heur",
      "linkedin": "URL LinkedIn si trouvée ou null",
      "source": "Source de l'info"
    }
  ]
}`;

      const contactsRes = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: contactsPrompt }]
        })
      });
      const contactsJson = await contactsRes.json();
      const contactsText = (contactsJson.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
      if (contactsText) {
        const jsonMatch = contactsText.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          const parsed = JSON.parse(jsonMatch[0]);
          contacts = parsed.contacts || [];
        }
      }
    } catch(e) {
      contacts = [];
    }

    // ── STEP 5: Claude synthesis ──
    setGcStep(4, 82);
    await sleep(200);

    const avgRating = analyzed.filter(p=>p.rating).reduce((a,p,_,arr)=>a+p.rating/arr.length,0);
    const totalHits = analyzed.reduce((a,p)=>a+p.totalHits,0);
    const hotCount  = analyzed.filter(p=>p.score>=50).length;

    const kwTotals = {};
    ALL_KEYWORDS.forEach(({kw, catId, cls}) => {
      const c = analyzed.reduce((a,p)=>a+(p.kwHits[kw]?.count||0),0);
      if (c>0) kwTotals[kw] = { count: c, catId, cls };
    });
    const kwRanked = Object.entries(kwTotals).sort((a,b)=>b[1].count-a[1].count);
    const topSignals = kwRanked.slice(0,6).map(([k,v])=>`${k} (${v.count}×)`).join(', ');

    const worstReviews = analyzed

    const synthPrompt = `Tu es un consultant expert en expérience client et transformation digitale. Tu prépares un sales de Plug'Heur (bornes de recharge smartphones, B2B, installation gratuite) à rencontrer un décideur de ${brand}.

L'objectif : arriver en conseiller, pas en vendeur. Montrer qu'on connaît leur business mieux qu'eux.

ACTUALITÉS & STRATÉGIE :
${webData?.actus?.slice(0,3).map(a=>`- ${a.titre} : ${a.resume}`).join('\n') || 'Non disponibles'}

- Signaux Plug'Heur détectés : ${topSignals || 'aucun'}
- Avis négatifs les plus sévères :
${worstReviews || 'Non disponibles'}

USAGE SMARTPHONE DANS LES AVIS (${mobileSignalCount} mentions) :
${negativeMobileSample || 'Pas de mentions négatives détectées'}

Génère une fiche de préparation RDV structurée. Format HTML inline (pas de markdown). Utilise <strong> pour les éléments clés. Structure :

[2-3 phrases sur l'état réel de l'expérience client, basé sur les données]

// ━━━ SEARCH FLOW ━━━
async function runSearch(limit) {
  initLoad();
  setLoad('Recherche des établissements...',5);
  addLog(`"${S.sector}" à ${S.city}`,'act');
  try {
    const places = await textSearch(`${S.sector} ${S.city}`, limit);
    if(!places.length) throw new Error('Aucun établissement trouvé. Essaie un secteur plus large.');
    addLog(`${places.length} établissements trouvés`,'ok');

    const detailed=[];
    for(let i=0;i<places.length;i++){
      setLoad(`Lecture des avis (${i+1}/${places.length})...`,15+Math.round(i/places.length*70));
      if(i%4===0) addLog(`[${i+1}/${places.length}] ${places[i].displayName?.text||'...'}`, 'act');
      try {
        const det=await placeDetails(places[i].name);
        detailed.push(buildPlace(places[i],det));
      } catch { detailed.push(buildPlace(places[i],null)); }
      await sleep(90);
    }

    addLog('Analyse des signaux...','act');
    setLoad('Calcul des scores...',88);
    await sleep(200);

    S.analyzed=detailed.map(p=>scorePlace(p)).sort((a,b)=>b.score-a.score);
    setLoad('Terminé ✓',100);
    addLog('Analyse complète','ok');
    await sleep(350);
    renderResults();
  } catch(e) {
    console.error(e);
    renderSearch(e.message||'Erreur API Google Places.');
  }
}

// ━━━ GOOGLE API ━━━
async function textSearch(query,pageSize) {
  const r=await fetch('https://places.googleapis.com/v1/places:searchText',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'X-Goog-Api-Key':API_KEY,
      'X-Goog-FieldMask':'places.name,places.id,places.displayName,places.rating,places.userRatingCount,places.formattedAddress,places.primaryTypeDisplayName'
    },
    body:JSON.stringify({textQuery:query,pageSize:Math.min(pageSize,20),languageCode:'fr'})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Google API ${r.status}`);}
  return (await r.json()).places||[];
}
async function placeDetails(name) {
  const r=await fetch(`https://places.googleapis.com/v1/${name}`,{
    headers:{'X-Goog-Api-Key':API_KEY,'X-Goog-FieldMask':'id,displayName,rating,userRatingCount,formattedAddress,primaryTypeDisplayName,reviews,websiteUri,internationalPhoneNumber'}
  });
  if(!r.ok) throw new Error(`Details ${r.status}`);
  return r.json();
}

// ━━━ DATA ━━━
function buildPlace(basic,det) {
  const d=det||basic;
  const reviews=(d.reviews||[]).map(r=>({
    text:r.text?.text||r.originalText?.text||'',
    rating:r.rating||null,
    author:r.authorAttribution?.displayName||'Anonyme'
  })).filter(r=>r.text.length>3);
  return {
    id:basic.id,
    name:d.displayName?.text||basic.displayName?.text||'Inconnu',
    address:d.formattedAddress||basic.formattedAddress||'',
    rating:d.rating||basic.rating||null,
    reviewCount:d.userRatingCount||basic.userRatingCount||0,
    category:d.primaryTypeDisplayName?.text||'',
    website:d.websiteUri||null,
    phone:d.internationalPhoneNumber||null,
    reviews
  };
}

function scorePlace(p) {
  const allText=p.reviews.map(r=>r.text).join(' ').toLowerCase();
  const kwHits={};
  const catHits={};

  ALL_KEYWORDS.forEach(({kw,catId,cls})=>{
    const words=kw.toLowerCase().split(' ');
    const search=words.length>=2?words.slice(0,2).join(' '):words[0];
    const re=new RegExp(search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    const n=(allText.match(re)||[]).length;
    kwHits[kw]={count:n,catId,cls};
    catHits[catId]=(catHits[catId]||0)+n;
  });

  const totalHits=Object.values(kwHits).reduce((a,{count})=>a+count,0);
  const matchedReviews=p.reviews.filter(r=>{
    const t=r.text.toLowerCase();
    return ALL_KEYWORDS.some(({kw})=>{
      const words=kw.split(' ');
      const s=words.length>=2?words.slice(0,2).join(' '):words[0];
      return t.includes(s);
    });
  });

  const ratingScore=p.rating?Math.max(0,(4.5-p.rating)*18):15;
  const kwScore=Math.min(totalHits*12,60);
  const reviewFactor=Math.min(Math.log10((p.reviewCount||1)+1)*10,20);
  const score=Math.round(kwScore+ratingScore+reviewFactor);

  return {...p, kwHits, catHits, totalHits, matchedReviews, score};
}

function renderResults() {

  const totalR=S.analyzed.reduce((a,p)=>a+p.reviews.length,0);
  const totalH=S.analyzed.reduce((a,p)=>a+p.totalHits,0);
  const hot=S.analyzed.filter(p=>p.score>=50).length;

  // Per-keyword totals sorted by count
  const kwTotals={};
  ALL_KEYWORDS.forEach(({kw,catId,cls})=>{
    const count=S.analyzed.reduce((a,p)=>a+(p.kwHits[kw]?.count||0),0);
    if(count>0) kwTotals[kw]={count,catId,cls};
  });
  const kwRanked=Object.entries(kwTotals).sort((a,b)=>b[1].count-a[1].count);
  const maxKw=kwRanked[0]?.[1]?.count||1;

  // Per-category totals for table columns
  const catTotals={};
  KW_CATEGORIES.forEach(cat=>{
    catTotals[cat.id]=S.analyzed.reduce((a,p)=>a+(p.catHits[cat.id]||0),0);
  });
  const activeCats=KW_CATEGORIES.filter(cat=>catTotals[cat.id]>0);

  document.getElementById('main').innerHTML = `
  <div class="results-page">
    <div class="res-topbar">
      <button class="back-btn" onclick="goBack()">← Retour</button>
      <div class="res-title"><strong>"${esc(S.sector)}"</strong> à <strong>${esc(S.city)}</strong> · ${S.analyzed.length} établissements · ${totalR} avis lus</div>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <div class="stats-strip">
      <div class="stat-card"><div class="stat-val">${S.analyzed.length}</div><div class="stat-label">Établissements analysés</div></div>
      <div class="stat-card"><div class="stat-val">${totalR}</div><div class="stat-label">Avis clients lus</div></div>
      <div class="stat-card"><div class="stat-val y">${totalH}</div><div class="stat-label">Signaux détectés</div></div>
      <div class="stat-card"><div class="stat-val r">${hot}</div><div class="stat-label">Prospects chauds 🔥</div></div>
    </div>

    <div class="sec-head">Signaux les plus fréquents dans les avis</div>
    ${kwRanked.length===0
      ? `<p style="font-size:13px;color:var(--muted);margin-bottom:32px">Aucun signal détecté dans les avis disponibles. Google Places retourne 5 avis max/lieu — essaie avec plus d'établissements.</p>`
      : `<div class="signals-grid">
        ${kwRanked.slice(0,20).map(([kw,{count,catId,cls}])=>{
          const cat=KW_CATEGORIES.find(c=>c.id===catId);
          const pct=Math.round(count/maxKw*100);
          const venues=S.analyzed.filter(p=>(p.kwHits[kw]?.count||0)>0).length;
          return `<div class="sig-card ${cls}">
            <div class="sig-card-accent"></div>
            <div class="sig-cat-label"><span class="sig-cat-dot"></span>${cat?.emoji} ${cat?.label||catId}</div>
            <div class="sig-kw">${esc(kw)}</div>
            <div class="sig-count">${count}</div>
            <div class="sig-bar"><div class="sig-bar-fill" style="width:${pct}%"></div></div>
            <div class="sig-venues">${venues} lieu${venues>1?'x':''} concerné${venues>1?'s':''}</div>
          </div>`;
        }).join('')}
        </div>`
    }

    <div class="sec-head">Prospects — cliquer pour voir les avis + générer le script</div>
    <div class="ctrl-bar">
      ${['score','rating','totalHits','reviewCount'].map(col=>{
        const labels={score:'Score',rating:'Note',totalHits:'Signaux',reviewCount:'Avis'};
        return `<button class="sort-pill ${S.sortCol===col?'on':''}" onclick="setSort('${col}')">${labels[col]} ↕</button>`;
      }).join('')}
      <input class="filter-input" placeholder="Filtrer par nom ou adresse..." value="${esc(S.filter)}" oninput="S.filter=this.value;renderResults()" />
      <span class="res-count">${data.length} résultat${data.length>1?'s':''}</span>
    </div>

    <div class="tbl-wrap">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:36px">#</th>
              <th onclick="setSort('name')">Établissement</th>
              <th onclick="setSort('rating')" class="${S.sortCol==='rating'?'on':''}">Note ↕</th>
              <th onclick="setSort('reviewCount')" class="${S.sortCol==='reviewCount'?'on':''}">Avis ↕</th>
              ${activeCats.map(cat=>`<th onclick="setSort('cat_${cat.id}')" class="${S.sortCol==='cat_'+cat.id?'on':''}" title="${esc(cat.label)}">${cat.emoji} ${esc(cat.label.length>14?cat.label.slice(0,14)+'…':cat.label)} ↕</th>`).join('')}
              <th onclick="setSort('totalHits')" class="${S.sortCol==='totalHits'?'on':''}">Total ↕</th>
              <th class="th-score ${S.sortCol==='score'?'on':''}" onclick="setSort('score')">
                <div class="th-score-inner">Score ↕ <span class="th-info">?</span></div>
                <div class="th-tooltip" onclick="event.stopPropagation()">
                  <div class="tt-title">Calcul du Score</div>
                  <div class="tt-row"><span class="tt-badge">0→60</span>Keywords dans les avis × 12</div>
                  <div class="tt-row"><span class="tt-badge">0→36</span>Note basse : (4.5 − note) × 18</div>
                  <div class="tt-row"><span class="tt-badge">0→20</span>Volume d'avis : log₁₀(nb+1) × 10</div>
                  <div class="tt-sep"></div>
                  <div class="tt-row">🔥 ≥50 Chaud · → 25–49 Tiède · · &lt;25 Froid</div>
                </div>
              </th>
              <th>Opport.</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${data.map((p,i)=>{
              const rc=p.rating>=4.2?'good':p.rating>=3.5?'ok':'bad';
              const oc=p.score>=50?'hot':p.score>=25?'warm':'cold';
              const ol=p.score>=50?'🔥 Chaud':p.score>=25?'→ Tiède':'· Froid';
              return `<tr id="row-${p.id}">
                <td><div class="rank">${i+1}</div></td>
                <td style="min-width:200px">
                  <div class="vname">${esc(p.name)}</div>
                  <div class="vaddr">${esc(p.address)}</div>
                  ${p.category?`<div class="vcat">${esc(p.category)}</div>`:''}
                </td>
                <td><span class="rval ${rc}">${p.rating?p.rating.toFixed(1)+'★':'—'}</span></td>
                <td style="font-size:13px;font-weight:600">${p.reviewCount||'—'}</td>
                ${activeCats.map(cat=>{
                  const n=p.catHits[cat.id]||0;
                  const cls=`hval-${cat.cls}`;
                  return `<td>${n>0?`<span class="${cls}">${n}</span>`:`<span class="hval z">·</span>`}</td>`;
                }).join('')}
                <td><span class="hval ${p.totalHits>=3?'hot':''}">${p.totalHits||'·'}</span></td>
                <td><span class="sval ${oc}">${p.score}</span></td>
                <td><span class="opp ${oc}">${ol}</span></td>
                <td><button class="action-btn" onclick="openPanel('${p.id}')">Voir avis + Script →</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

// ━━━ SIDE PANEL ━━━
async function openPanel(pid) {
  const p=S.analyzed.find(x=>x.id===pid);
  if(!p) return;
  document.querySelectorAll('tr.sel').forEach(r=>r.classList.remove('sel'));
  document.getElementById(`row-${pid}`)?.classList.add('sel');

  const oc=p.score>=50?'red':p.score>=25?'amber':'neutral';
  const rc=p.rating>=4.2?'green':p.rating>=3.5?'amber':'red';
  const topSigs=Object.entries(p.kwHits)
    .filter(([,{count}])=>count>0)
    .sort((a,b)=>b[1].count-a[1].count)
    .slice(0,5)
    .map(([kw,{count,cls}])=>`<span class="ptag ${cls}" style="margin-right:4px">${esc(kw)} ×${count}</span>`)
    .join('');

  // External search links
  const liUrl = `https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(p.name+' directeur OR manager OR gérant')}`;
  const socUrl = `https://www.societe.com/cgi-bin/search?champs=${encodeURIComponent(p.name)}`;
  const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(p.name+' '+p.address)}`;

  document.getElementById('panel').innerHTML = `
  <div class="overlay" onclick="if(event.target===this)closePanel()">
    <div class="side-panel">
      <div class="panel-top">
        <div class="panel-top-row">
          <div style="flex:1">
            <div class="panel-name">${esc(p.name)}</div>
            <div class="panel-tags">
              ${p.rating?`<span class="ptag ${rc}">★ ${p.rating.toFixed(1)}/5</span>`:''}
              ${p.reviewCount?`<span class="ptag neutral">${p.reviewCount} avis</span>`:''}
              <span class="ptag yellow">${p.totalHits} signal${p.totalHits>1?'s':''}</span>
              <span class="ptag ${oc}">Score ${p.score}</span>
            </div>
          </div>
          <button class="panel-close" onclick="closePanel()">✕</button>
        </div>
        ${topSigs?`<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:5px">${topSigs}</div>`:''}

        <!-- Contact card -->
        <div class="contact-card">
          <div class="contact-card-title">Contacts & Accès rapide</div>
          <div class="contact-rows">
            <div class="contact-row">
              <div class="contact-icon">📞</div>
              <div>
                <div class="contact-label">Téléphone</div>
                ${p.phone
                  ? `<div class="contact-value"><a href="tel:${esc(p.phone)}">${esc(p.phone)}</a></div>`
                  : `<div class="contact-value dim">Non indexé par Google Places</div>`}
              </div>
            </div>
            ${p.website ? `<div class="contact-row">
              <div class="contact-icon">🌐</div>
              <div>
                <div class="contact-label">Site web</div>
                <div class="contact-value"><a href="${esc(p.website)}" target="_blank">${esc(p.website.replace(/^https?:\/\//,'').split('/')[0])}</a></div>
              </div>
            </div>` : ''}
          </div>
          <div class="contact-links">
            <a class="clink linkedin" href="${liUrl}" target="_blank">🔗 Trouver le dirigeant</a>
            <a class="clink societe" href="${socUrl}" target="_blank">🏢 Société.com</a>
            <a class="clink maps" href="${mapsUrl}" target="_blank">📍 Google Maps</a>
          </div>
        </div>
      </div>

      <div class="panel-body">
        <div class="panel-section">
          <div class="psec-title">Ce que disent les clients</div>
          ${buildEvidenceHTML(p)}
        </div>
        <div class="panel-section">
          <div class="psec-title">Script Cold Call</div>
          <div id="scriptZone">
            <div class="script-loading">
              <div class="mini-spin"></div>
              <span class="script-loading-text">Génération du script personnalisé basé sur les vrais avis...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  generateScript(p);
}

function buildEvidenceHTML(p) {
  const reviews = p.matchedReviews?.length>0 ? p.matchedReviews : p.reviews;
  if(!reviews||reviews.length===0) {
    return `<div class="ev-empty">Aucun avis disponible pour cet établissement.<br>Google Places retourne 5 avis max par lieu.</div>`;
  }
  return `<div class="ev-list">
    ${reviews.slice(0,5).map(r=>{
      let text=esc(r.text);
      ALL_KEYWORDS.forEach(({kw})=>{
        const words=kw.toLowerCase().split(' ');
        const search=words.length>=2?words.slice(0,2).join(' '):words[0];
        const re=new RegExp(`(${search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        text=text.replace(re,'<mark>$1</mark>');
      });
      const tone=r.rating?(r.rating<=2?'neg':r.rating>=4?'pos':'neu'):'neu';
      const stars=r.rating?'★'.repeat(r.rating)+'☆'.repeat(5-r.rating):'';
      return `<div class="ev-item ${tone}">
        ${stars||r.author?`<div class="ev-rating"><span class="ev-stars">${stars}</span>${r.author?`<span>${esc(r.author)}</span>`:''}}</div>`:''}
        <div class="ev-text">${text}</div>
      </div>`;
    }).join('')}
  </div>`;
}

async function generateScript(p) {
  const reviewCtx=p.matchedReviews.slice(0,5).map(r=>`[${r.rating?r.rating+'★':'?'}] "${r.text}"`).join('\n');
  const topSigs=Object.entries(p.kwHits)
    .filter(([,{count}])=>count>0)
    .sort((a,b)=>b[1].count-a[1].count)
    .slice(0,5)
    .map(([kw,{count}])=>`${kw} (${count}x)`)
    .join(', ');

  const prompt=`Tu es un expert sales B2B pour Plug'Heur — startup qui déploie des bornes de recharge pour smartphones dans les établissements (salles de sport, hôtels, casinos, centres commerciaux). Installation gratuite, revenue share sur les utilisations.

Établissement :
- Nom : ${p.name}
- Secteur : ${S.sector} à ${S.city}
- Note Google : ${p.rating?p.rating+'/5':'non disponible'}
- Signaux dans les avis : ${topSigs||'expérience client dégradée'}
- Extraits d'avis :
${reviewCtx||'Non disponibles'}

Génère un script cold call en français. Ton : direct, humain, pas corporate. Court, percutant.

Structure obligatoire :
1. Intro : "Bonjour, je m'appelle [Prénom] de Plug'Heur..."
2. Accroche "J'ai vu que..." — cite le problème exact détecté dans les vrais avis
3. Impact business en 1 phrase (réputation, churn, expérience)
4. Solution Plug'Heur en 2 phrases max (sans jargon)
5. Question ouverte pour créer le dialogue

Règles :
- Max 160 mots
- Basé sur les vrais signaux — pas générique
- Mets **en gras** les phrases clés à valoriser à l'oral
- Réponds UNIQUEMENT avec le script, rien d'autre`;

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const raw=(data.content||[]).find(b=>b.type==='text')?.text||'Erreur de génération.';
    const formatted=raw.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    const zone=document.getElementById('scriptZone');
    if(zone) zone.innerHTML=`
      <div class="script-box">
        <div class="script-header">
          <span class="script-header-left">Script — ${esc(p.name)}</span>
          <button class="copy-btn" id="cpBtn" onclick="copyScript()">📋 Copier</button>
        </div>
        <div class="script-content" id="scriptContent">${formatted}</div>
      </div>`;
  } catch(e) {
    const zone=document.getElementById('scriptZone');
    if(zone) zone.innerHTML=`<div class="no-data">Erreur de génération. Vérifie ta connexion.</div>`;
  }
}

function copyScript() {
  const el=document.getElementById('scriptContent');
  if(!el) return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    const btn=document.getElementById('cpBtn');
    if(btn){btn.textContent='✓ Copié !';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML='📋 Copier';btn.classList.remove('copied');},2200);}
  });
}
function closePanel() {
  document.getElementById('panel').innerHTML='';
  document.querySelectorAll('tr.sel').forEach(r=>r.classList.remove('sel'));
}

// ━━━ UTILS ━━━
function filtered() {
  let d=[...S.analyzed];
  if(S.filter){const f=S.filter.toLowerCase();d=d.filter(p=>p.name.toLowerCase().includes(f)||p.address.toLowerCase().includes(f));}
  d.sort((a,b)=>{
    let va,vb;
    if(S.sortCol.startsWith('cat_')){const id=S.sortCol.slice(4);va=a.catHits[id]||0;vb=b.catHits[id]||0;}
    else{va=a[S.sortCol]??0;vb=b[S.sortCol]??0;}
    if(typeof va==='string')return S.sortDir*va.localeCompare(vb);
    return S.sortDir*(vb-va);
  });
  return d;
}
function setSort(col){S.sortDir=S.sortCol===col?S.sortDir*-1:-1;S.sortCol=col;renderResults();}
function goBack(){S.analyzed=[];document.getElementById('panel').innerHTML='';renderSearch();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function exportCSV() {
  const data=filtered();
  const catCols=KW_CATEGORIES.map(c=>c.label);
  const headers=['Rang','Nom','Adresse','Catégorie','Note','Nb avis',...catCols,'Total signaux','Score','Opportunité'];
  const rows=data.map((p,i)=>[
    i+1,p.name,p.address,p.category||'',p.rating||'',p.reviewCount||'',
    ...KW_CATEGORIES.map(cat=>p.catHits[cat.id]||0),
    p.totalHits,p.score,p.score>=50?'Chaud':p.score>=25?'Tiède':'Froid'
  ]);
  const csv=[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`prospects_${S.sector}_${S.city}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
